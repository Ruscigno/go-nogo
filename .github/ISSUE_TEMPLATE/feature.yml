name: Feature request
description: Suggest a change to V1 or beyond
labels: [feature]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Who has it? How often?
    validations: { required: true }
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
    validations: { required: true }
  - type: dropdown
    id: scope
    attributes:
      label: Where does this fit?
      options:
        - V1 — already in product-research.md §5.1
        - V1 — adds something inside spirit but not on the list
        - V2 / post-PMF (product-research.md §5.2)
        - Hits a documented V1 cut from product-research.md §5.4 (please justify)
    validations: { required: true }
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
