version: 2
updates:
  - package-ecosystem: npm
    directory: /web
    schedule: { interval: weekly, day: monday }
    open-pull-requests-limit: 5
    groups:
      js-deps:
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: gomod
    directory: /backend
    schedule: { interval: weekly, day: monday }
    open-pull-requests-limit: 5
    groups:
      go-deps:
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: docker
    directory: /web
    schedule: { interval: monthly }

  - package-ecosystem: docker
    directory: /backend
    schedule: { interval: monthly }
