# Pre-commit hooks. Install once via `make bootstrap` (runs `pre-commit install`).
# CI re-runs them as defense in depth via .woodpecker/pr.yml.

default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: local
    hooks:
      - id: no-co-authored-by
        name: Reject Co-Authored-By trailers (single-author policy)
        entry: scripts/hooks/check-single-author.sh
        language: script
        stages: [commit-msg]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
        # SvelteKit / VSCode tsconfig + settings use JSONC (trailing
        # commas, comments). Strict JSON validation false-positives;
        # web/'s own `pnpm check` covers tsconfig validity.
        exclude: '(^web/tsconfig\.json$|/tsconfig.*\.json$|\.vscode/.*\.json$)'
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key
        exclude: '^\.gitleaks\.toml$'
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [ts, tsx, javascript, jsx, json, yaml, markdown, svelte]
        # Meta-docs only. web/ has its own .prettierrc + `pnpm lint`
        # gate (see the local web-lint hook below); double-formatting
        # produces config-conflict ping-pong (tab vs 2-space, single vs
        # double quote).
        files: ^(docs/|\.github/|\.claude/|prompts/|journal/)

  - repo: local
    hooks:
      - id: web-lint
        name: pnpm lint (web)
        entry: bash -c 'if [ -d web ] && [ -f web/package.json ]; then cd web && pnpm lint --fix; fi'
        language: system
        files: '^web/.*\.(ts|tsx|js|jsx|svelte)$'
        pass_filenames: false

      - id: go-fmt
        name: gofmt (backend)
        entry: bash -c 'if [ -d backend ] && [ -f backend/go.mod ]; then cd backend && gofmt -l -w . ; fi'
        language: system
        files: '^backend/.*\.go$'
        pass_filenames: false

      - id: no-pii-in-logs
        name: No PII / secrets in log call sites (AC-X05)
        entry: scripts/check-no-pii-in-logs.sh
        language: script
        files: '^(web/src|backend)/.*\.(ts|svelte|go)$'
        pass_filenames: false

      - id: verdict-purity
        name: Verdict engine stays a pure function (ADR-0003)
        entry: scripts/check-verdict-purity.sh
        language: script
        files: '^backend/internal/verdict/.*\.go$'
        pass_filenames: false
