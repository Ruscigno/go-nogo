# PR checks — gating pipeline for every PR + push to main.
#
# Runs on the self-hosted Woodpecker server (see iac-tickerbeats) with
# WOODPECKER_BACKEND=local: each step shells out on the host using the
# brew-installed toolchain. `pnpm`, `node`, `go`, `golangci-lint`,
# `gitleaks`, `semgrep`, `docker`, `migrate` live under /opt/homebrew/bin/.
#
# Local-backend quirks (mirrored from the sibling repos):
#   1. skip_clone: true — Woodpecker's implicit auto-clone uses the
#      plugin-git Docker plugin, which the local backend can't run.
#      We do the clone ourselves in the first step.
#   2. image: bash — Woodpecker's YAML schema rejects `local` as a
#      sentinel; `bash` passes validation and is informational under
#      the local backend (the step just shells out on the host).
#   3. $${VAR:-default} — escapes Woodpecker's template engine so the
#      bash default-value syntax passes through to the shell.
#
# Companion: .woodpecker/deploy.yml runs the Cloud Run cutover on push
# to main (web + backend, path-gated).

when:
  - event: pull_request
    branch:
      - main
      - 'epic/**'
      - 'feat/**'
      - 'chore/**'
      - 'fix/**'
  - event: push
    branch: main

skip_clone: true

steps:
  # ----------------------------------------------------------------------
  # Manual clone (replaces the implicit plugin-git step)
  # ----------------------------------------------------------------------
  - name: clone
    image: bash
    commands:
      # SSH because the go-nogo repo is private and HTTPS would
      # prompt for credentials (no TTY). The agent runs as the founder
      # under launchd, so ~/.ssh/ + macOS Keychain handle auth.
      - rm -rf ./* ./.git 2>/dev/null || true
      - git init -q
      - 'git remote add origin "$CI_REPO_CLONE_SSH_URL"'
      # Depth 200 is enough for single-author + spec-guard merge-base lookups.
      - 'git fetch --depth=200 origin "$CI_COMMIT_SHA"'
      - git checkout -q FETCH_HEAD

  # ----------------------------------------------------------------------
  # Always-on gates
  # ----------------------------------------------------------------------
# >>> shared-ci-gates (managed by iac-tickerbeats/ci/gates — do not edit) >>>
  - name: gates-integrity
    image: bash
    when:
      - event: pull_request
    commands:
      - bash scripts/check-ci-gates-integrity.sh
  - name: secret-scan
    image: bash
    commands:
      - bash scripts/check-secret-scan.sh
  - name: sast
    image: bash
    commands:
      - bash scripts/check-sast.sh
  - name: single-author
    image: bash
    when:
      - event: pull_request
    commands:
      - bash scripts/check-single-author.sh
  - name: gates-tests
    image: bash
    when:
      - event: pull_request
    commands:
      - bash scripts/ci-lib.test.sh
      - bash scripts/check-single-author.test.sh
      - bash scripts/check-spec-guard.test.sh
      - bash scripts/check-ci-gates-integrity.test.sh
  - name: spec-guard
    image: bash
    when:
      - event: pull_request
    commands:
      - bash scripts/check-spec-guard.sh
# <<< shared-ci-gates <<<

  - name: no-pii-in-logs
    image: bash
    when:
      - path: ['web/src/**', 'backend/**']
    commands:
      # Enforces AC-X05 (no PII / secrets inside log call sites).
      - bash scripts/check-no-pii-in-logs.sh

  # ----------------------------------------------------------------------
  # Web — Node 20 + pnpm + lint + typecheck + test + build + audit
  # Gated on web/** so this is a no-op until the SvelteKit scaffold lands
  # in Phase 5 M1.
  # ----------------------------------------------------------------------
  - name: web
    image: bash
    when:
      - path: ['web/**']
    commands:
      - cd web
      - pnpm install --frozen-lockfile
      - pnpm lint
      - pnpm check
      - pnpm test -- --coverage
      - pnpm build
      - pnpm audit --audit-level=high

  # ----------------------------------------------------------------------
  # Backend — Go 1.25 + gofmt + vet + golangci-lint + sqlc drift + test
  # Gated on backend/** so this is a no-op until the Go scaffold lands
  # in Phase 5 M3.
  # ----------------------------------------------------------------------
  - name: backend
    image: bash
    when:
      - path: ['backend/**', 'db/migrations/**']
    commands:
      - 'test -d backend || { echo "skip: no backend/ directory yet"; exit 0; }'
      - cd backend
      - test -f go.mod || { echo "no backend/go.mod yet — skipping"; exit 0; }
      - gofmt -l . | tee /tmp/gofmt.out
      - 'test ! -s /tmp/gofmt.out || { echo "gofmt: files need formatting"; exit 1; }'
      - go vet ./...
      - golangci-lint run
      # sqlc diff catches schema/query drift: queries must match db/migrations.
      - sqlc diff
      - go test -race -cover ./...
      - govulncheck ./...

  # ----------------------------------------------------------------------
  # DB — golang-migrate up → down-all → up against ephemeral Supabase
  # Postgres (image ships with the `auth` schema pre-installed, so RLS
  # policies + the on_auth_user_created trigger compile).
  # ----------------------------------------------------------------------
  - name: db-start
    image: bash
    when:
      - path: ['db/migrations/**']
    environment:
      # Colima exposes Docker on a per-user socket, not /var/run/docker.sock.
      DOCKER_HOST: unix:///Users/sander/.colima/default/docker.sock
    commands:
      # Bind host port 5443 (each gear's CI Postgres on its own port).
      # postgres:16-alpine — fast + reliable. The gear's migration lives in
      # its own `gonogo` schema and does not reference Supabase's auth.users
      # (Cortex shared-Postgres model), so the heavier supabase/postgres
      # image (which also init-races and drops early connections) isn't needed.
      - >-
        docker run -d --rm --name gonogo-pg-ci
        -e POSTGRES_PASSWORD=postgres
        -e POSTGRES_DB=postgres
        -p 5443:5432
        postgres:16-alpine
      - 'for i in $(seq 1 60); do docker exec gonogo-pg-ci pg_isready -U postgres >/dev/null 2>&1 && exit 0; sleep 1; done; echo "postgres did not become ready"; docker logs gonogo-pg-ci; exit 1'

  - name: db-migrate
    image: bash
    when:
      - path: ['db/migrations/**']
    environment:
      DB: postgres://postgres:postgres@localhost:5443/postgres?sslmode=disable
    commands:
      - migrate -path db/migrations -database "$DB" up
      - migrate -path db/migrations -database "$DB" down -all
      - migrate -path db/migrations -database "$DB" up

  - name: db-stop
    image: bash
    when:
      - path: ['db/migrations/**']
      - status: [success, failure]   # always tear down, even on migrate failure
    environment:
      DOCKER_HOST: unix:///Users/sander/.colima/default/docker.sock
    commands:
      - docker stop gonogo-pg-ci || true
