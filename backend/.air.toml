# air live-reload config for `make backend.dev`.
# Install: go install github.com/air-verse/air@latest
root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o tmp/server ./cmd/server"
  bin = "tmp/server"
  include_ext = ["go"]
  exclude_dir = ["tmp", "vendor", "dist", "bin"]
  delay = 500
  stop_on_error = true

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"
